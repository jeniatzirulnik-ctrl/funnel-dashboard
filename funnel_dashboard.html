<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Ads Funnel Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
  .page { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .topbar-title { font-size: 18px; font-weight: 600; color: #111; display: flex; align-items: center; gap: 8px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; display: inline-block; transition: background 0.3s; }
  .status-txt { font-size: 12px; color: #666; }
  .refresh-btn { font-size: 12px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #333; cursor: pointer; }
  .refresh-btn:hover { background: #f0f0f0; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; }
  .tlabel { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .toolbar select, .toolbar input[type=date] { font-size: 13px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; color: #111; }
  .sep { width: 1px; height: 24px; background: #e5e5e5; }
  .view-tabs { display: flex; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
  .view-tab { font-size: 12px; padding: 5px 12px; border: none; background: transparent; color: #666; cursor: pointer; font-weight: 500; }
  .view-tab.active { background: #3b82f6; color: #fff; }
  .view-tab:hover:not(.active) { background: #f0f0f0; }
  .wk-toggle { display: flex; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
  .wk-btn { font-size: 12px; padding: 5px 10px; border: none; background: transparent; color: #666; cursor: pointer; }
  .wk-btn.active { background: #3b82f6; color: #fff; }
  .metrics-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .metric { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; }
  .mlabel { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .mval { font-size: 26px; font-weight: 700; color: #111; line-height: 1.1; }
  .mval.sm { font-size: 15px; font-weight: 600; line-height: 1.4; color: #e24b4a; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 14px; }
  .funnel-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .funnel-table th { font-size: 11px; font-weight: 600; color: #888; padding: 6px 8px; text-align: left; border-bottom: 1px solid #eee; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.03em; }
  .funnel-table td { padding: 8px 8px; border-bottom: 1px solid #f0f0f0; color: #111; white-space: nowrap; vertical-align: middle; }
  .funnel-table tr:last-child td { border-bottom: none; }
  .funnel-table tbody tr:hover td { background: #fafafa; }
  .bar-bg { background: #f0f0f0; border-radius: 4px; height: 7px; width: 100px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .bar-fill { height: 7px; border-radius: 4px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
  .b-red { background: #fee2e2; color: #b91c1c; }
  .b-amber { background: #fef3c7; color: #92400e; }
  .b-green { background: #dcfce7; color: #166534; }
  .b-blue { background: #dbeafe; color: #1d4ed8; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .err-box { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #b91c1c; margin-bottom: 16px; line-height: 1.8; }
  .debug-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 14px 16px; font-size: 12px; color: #0369a1; margin-bottom: 16px; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="topbar-title">📊 Google Ads Funnel Dashboard</div>
    <div class="topbar-right">
      <span class="dot" id="dot"></span>
      <span class="status-txt" id="stxt">Loading…</span>
      <button class="refresh-btn" onclick="loadAndRender()">↺ Refresh</button>
    </div>
  </div>

  <div id="errBox" class="err-box" style="display:none;"></div>
  <div id="debugBox" class="debug-box" style="display:none;"></div>

  <div id="toolbar" class="toolbar" style="display:none;">
    <span class="tlabel">Campaign</span>
    <select id="selCamp" onchange="render()"><option value="ALL">All campaigns</option></select>
    <div class="sep"></div>
    <span class="tlabel">View</span>
    <div class="view-tabs">
      <button class="view-tab active" id="vDay" onclick="setView('day')">Day</button>
      <button class="view-tab" id="vWeek" onclick="setView('week')">Week</button>
      <button class="view-tab" id="vMonth" onclick="setView('month')">Month</button>
    </div>
    <div id="wkWrap" style="display:none; align-items:center; gap:8px;">
      <span class="tlabel">Week starts</span>
      <div class="wk-toggle">
        <button class="wk-btn active" id="btnSun" onclick="setWS('sun')">Sun</button>
        <button class="wk-btn" id="btnMon" onclick="setWS('mon')">Mon</button>
      </div>
    </div>
    <div class="sep"></div>
    <span class="tlabel">From</span>
    <input type="date" id="dFrom" onchange="render()">
    <span class="tlabel">To</span>
    <input type="date" id="dTo" onchange="render()">
  </div>

  <div id="metricsRow" class="metrics-row" style="display:none;"></div>

  <div id="funnelCard" class="card" style="display:none;">
    <div class="card-title">Funnel drop-off — step by step</div>
    <div style="overflow-x:auto;">
      <table class="funnel-table">
        <thead><tr>
          <th>#</th><th>Step</th>
          <th style="text-align:right;">Volume</th>
          <th>Share of entry</th>
          <th style="text-align:right;">Drop from prev</th>
          <th style="text-align:right;">vs prior period</th>
        </tr></thead>
        <tbody id="fTbody"></tbody>
      </table>
    </div>
  </div>

  <div id="trendCard" class="card" style="display:none;">
    <div class="card-title">Funnel steps over time</div>
    <div class="legend" id="trendLeg"></div>
    <div style="position:relative; width:100%; height:300px;">
      <canvas id="cTrend" role="img" aria-label="Line chart of funnel steps over time"></canvas>
    </div>
  </div>

  <div id="campCard" class="card" style="display:none;">
    <div class="card-title">Purchases by campaign</div>
    <div style="position:relative; width:100%; height:240px;">
      <canvas id="cCamp" role="img" aria-label="Bar chart of purchases by campaign"></canvas>
    </div>
  </div>

</div>

<script>
const PROXY = 'https://script.google.com/macros/s/AKfycbwgvArpF8_QS1G_DBm5BQiRVLC49mEQWTTyaSJLuNFwdLomgtKb5Vy_XZkWgz8gFOdJ/exec';

const STEPS = [
  'View Destinations Page','View Dates Page','View State Page',
  'View Travelers Page','View OB Loader Page','View Offer Page',
  'View Checkout Page','Component Payment card expanded','Purchase'
];
const SHORT = ['Destinations','Dates','State','Travelers','OB Loader','Offer','Checkout','Payment','Purchase'];
const COLORS = ['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ec4899','#ef4444','#06b6d4','#14b8a6','#84cc16'];

let allRows=[], view='day', ws='sun', cTrend=null, cCamp=null;
const $ = id => document.getElementById(id);

function iso(d){ return d.toISOString().slice(0,10).replace(/-/g,''); }
function fromIso(s){ return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8)); }
function toInput(s){ return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8); }
function fromInput(s){ return (s||'').replace(/-/g,''); }
function fmt(n){ return n >= 10000 ? (n/1000).toFixed(1)+'k' : Math.round(n).toLocaleString(); }
function fmtPct(v){ if(v===null) return '—'; return (v>=0?'+':'')+v.toFixed(1)+'%'; }
function weekKey(s){
  const d=fromIso(s), day=d.getDay(), diff=ws==='sun'?day:(day===0?6:day-1);
  const m=new Date(d); m.setDate(d.getDate()-diff); return iso(m);
}

function parseCSV(text){
  const rows=[], lines=text.trim().split('\n');
  for(let i=1; i<lines.length; i++){
    const parts=[]; let cur='', inQ=false;
    for(let c=0; c<lines[i].length; c++){
      const ch=lines[i][c];
      if(ch==='"'){ inQ=!inQ; }
      else if(ch===','&&!inQ){ parts.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    parts.push(cur.trim());
    if(parts.length<4) continue;
    const action=parts[1].replace(/"/g,'').trim();
    if(!STEPS.includes(action)) continue;
    const dayRaw=parts[2].replace(/"/g,'').trim().replace(/-/g,'');
    if(dayRaw.length!==8||isNaN(Number(dayRaw))) continue;
    rows.push({ campaign:parts[0].replace(/"/g,'').trim(), action, day:dayRaw, val:parseFloat(parts[3])||0 });
  }
  return rows;
}

async function loadAndRender(){
  setStatus('loading','Fetching data…');
  $('errBox').style.display='none';
  $('debugBox').style.display='none';
  ['toolbar','metricsRow','funnelCard','trendCard','campCard'].forEach(id=>$(id).style.display='none');
  try{
    const r = await fetch(PROXY, {redirect: 'follow'});
    const text = await r.text();

    // Show debug info always so we can see what came back
    $('debugBox').style.display='block';
    $('debugBox').textContent = 'HTTP status: ' + r.status + '\nFirst 500 chars:\n' + text.slice(0,500);

    if(!r.ok) throw new Error('HTTP '+r.status+' — see debug info above');
    if(!text || text.trim().startsWith('<'))
      throw new Error('Got HTML instead of CSV — script may need re-authorization. See debug box above.');

    allRows = parseCSV(text);
    if(allRows.length===0){
      throw new Error('Connected! But 0 rows matched funnel steps. Check debug box above to see raw data.');
    }

    // Success — hide debug
    $('debugBox').style.display='none';

    let minD='9999', maxD='0000';
    allRows.forEach(r=>{ if(r.day<minD)minD=r.day; if(r.day>maxD)maxD=r.day; });
    const f=$('dFrom'), t=$('dTo');
    if(!f.value){ const def=new Date(fromIso(maxD)); def.setDate(def.getDate()-29); f.value=toInput(iso(def)); }
    if(!t.value) t.value=toInput(maxD);
    const camps=[...new Set(allRows.map(r=>r.campaign))].sort();
    const sel=$('selCamp');
    sel.innerHTML='<option value="ALL">All campaigns</option>';
    camps.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c.length>50?c.slice(0,50)+'…':c; sel.appendChild(o); });
    $('toolbar').style.display='flex';
    setStatus('ok', allRows.length.toLocaleString()+' rows · '+camps.length+' campaigns · latest: '+toInput(maxD));
    render();
  } catch(e){
    setStatus('err','Failed — see error below');
    $('errBox').style.display='block';
    $('errBox').innerHTML='<strong>Error:</strong> '+e.message;
  }
}

function setStatus(s,msg){
  $('stxt').textContent=msg;
  $('dot').style.background = s==='ok'?'#22c55e' : s==='err'?'#ef4444' : '#f59e0b';
}

function getFiltered(){
  const from=fromInput($('dFrom').value)||'19700101', to=fromInput($('dTo').value)||'29991231', camp=$('selCamp').value;
  return allRows.filter(r=>r.day>=from&&r.day<=to&&(camp==='ALL'||r.campaign===camp));
}
function getPrior(){
  const from=fromInput($('dFrom').value)||'19700101', to=fromInput($('dTo').value)||'29991231', camp=$('selCamp').value;
  const fD=fromIso(from), tD=fromIso(to), span=Math.round((tD-fD)/86400000)+1;
  const pTo=new Date(fD); pTo.setDate(pTo.getDate()-1);
  const pFrom=new Date(pTo); pFrom.setDate(pTo.getDate()-span+1);
  return allRows.filter(r=>r.day>=iso(pFrom)&&r.day<=iso(pTo)&&(camp==='ALL'||r.campaign===camp));
}
function totals(rows){
  const t={}; STEPS.forEach(s=>t[s]=0);
  rows.forEach(r=>t[r.action]=(t[r.action]||0)+r.val); return t;
}
function grouped(rows){
  const kf = view==='day'?r=>r.day : view==='week'?r=>weekKey(r.day) : r=>r.day.slice(0,6);
  const g={};
  rows.forEach(r=>{ const k=kf(r); if(!g[k])g[k]={}; g[k][r.action]=(g[k][r.action]||0)+r.val; });
  return g;
}
function render(){
  const rows=getFiltered(), prows=getPrior(), tot=totals(rows), ptot=totals(prows);
  renderMetrics(tot); renderFunnel(tot,ptot); renderTrend(grouped(rows)); renderCamps(rows);
}
function renderMetrics(tot){
  const top=tot[STEPS[0]]||0, pur=tot['Purchase']||0, rate=top>0?pur/top*100:0;
  $('metricsRow').style.display='grid';
  $('metricsRow').innerHTML=`
    <div class="metric"><div class="mlabel">Entry (Destinations)</div><div class="mval">${fmt(top)}</div></div>
    <div class="metric"><div class="mlabel">Purchases</div><div class="mval">${fmt(pur)}</div></div>
    <div class="metric"><div class="mlabel">End-to-end rate</div><div class="mval">${rate.toFixed(2)}%</div></div>
    <div class="metric"><div class="mlabel">Biggest drop step</div><div class="mval sm">${getBigDrop(tot)}</div></div>`;
}
function getBigDrop(tot){
  let maxD=0, step='—';
  for(let i=1;i<STEPS.length;i++){
    const p=tot[STEPS[i-1]]||0, c=tot[STEPS[i]]||0;
    if(p>0){ const d=(p-c)/p*100; if(d>maxD){ maxD=d; step=SHORT[i]+' ('+d.toFixed(0)+'%)'; } }
  }
  return step;
}
function renderFunnel(tot,ptot){
  const top=Math.max(tot[STEPS[0]]||0,1), tb=$('fTbody'); tb.innerHTML='';
  STEPS.forEach((s,i)=>{
    const val=tot[s]||0, prev=i>0?(tot[STEPS[i-1]]||0):val;
    const drop=prev>0&&i>0?(prev-val)/prev*100:null, share=val/top*100;
    const pval=ptot[s]||0, vp=pval>0?(val-pval)/pval*100:null;
    let dB='—'; if(drop!==null){ const c=drop>60?'b-red':drop>30?'b-amber':'b-green'; dB=`<span class="badge ${c}">-${drop.toFixed(1)}%</span>`; }
    let pB='—'; if(vp!==null){ const c=vp>0?'b-green':vp<0?'b-red':'b-blue'; pB=`<span class="badge ${c}">${fmtPct(vp)}</span>`; }
    tb.innerHTML+=`<tr>
      <td style="color:#aaa;font-weight:700;font-size:12px;">${i+1}</td>
      <td>${s}</td>
      <td style="text-align:right;font-weight:600;">${fmt(val)}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(share,100).toFixed(1)}%;background:${COLORS[i]};"></div></div>
        <span style="font-size:11px;color:#888;margin-left:6px;">${share.toFixed(1)}%</span></td>
      <td style="text-align:right;">${dB}</td>
      <td style="text-align:right;">${pB}</td></tr>`;
  });
  $('funnelCard').style.display='block';
}
function renderTrend(grp){
  const keys=Object.keys(grp).sort();
  const labels=keys.map(k=>{
    if(view==='month') return k.slice(0,4)+'/'+k.slice(4,6);
    const d=fromIso(k); return (d.getMonth()+1)+'/'+(d.getDate());
  });
  const datasets=STEPS.map((s,i)=>({
    label:SHORT[i], data:keys.map(k=>(grp[k]&&grp[k][s])||0),
    borderColor:COLORS[i], borderWidth:2, pointRadius:keys.length<=25?3:0,
    tension:0.3, fill:false, borderDash:i===8?[5,3]:[]
  }));
  $('trendLeg').innerHTML=STEPS.map((s,i)=>`<span class="leg-item"><span class="leg-dot" style="background:${COLORS[i]};"></span>${SHORT[i]}</span>`).join('');
  const ctx=$('cTrend').getContext('2d');
  if(cTrend) cTrend.destroy();
  cTrend=new Chart(ctx,{ type:'line', data:{labels,datasets}, options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false}, tooltip:{mode:'index',intersect:false,callbacks:{label:c=>SHORT[c.datasetIndex]+': '+fmt(c.raw)}} },
    scales:{
      x:{ ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:20}, grid:{display:false} },
      y:{ ticks:{font:{size:10},callback:v=>fmt(v)}, grid:{color:'rgba(0,0,0,0.05)'} }
    }, animation:false
  }});
  $('trendCard').style.display='block';
}
function renderCamps(rows){
  const byC={};
  rows.filter(r=>r.action==='Purchase').forEach(r=>byC[r.campaign]=(byC[r.campaign]||0)+r.val);
  const entries=Object.entries(byC).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!entries.length){ $('campCard').style.display='none'; return; }
  const ctx=$('cCamp').getContext('2d');
  if(cCamp) cCamp.destroy();
  cCamp=new Chart(ctx,{ type:'bar', data:{
    labels:entries.map(e=>e[0].length>30?e[0].slice(0,30)+'…':e[0]),
    datasets:[{ label:'Purchases', data:entries.map(e=>Math.round(e[1])),
      backgroundColor:entries.map((_,i)=>COLORS[i%COLORS.length]+'cc'), borderRadius:5 }]
  }, options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false} },
    scales:{
      x:{ ticks:{font:{size:10},maxRotation:40} },
      y:{ ticks:{font:{size:10},callback:v=>fmt(v)}, grid:{color:'rgba(0,0,0,0.05)'} }
    }, animation:false
  }});
  $('campCard').style.display='block';
}
function setView(v){
  view=v;
  ['Day','Week','Month'].forEach(x=>$('v'+x).classList.remove('active'));
  $('v'+v[0].toUpperCase()+v.slice(1)).classList.add('active');
  $('wkWrap').style.display=v==='week'?'flex':'none';
  render();
}
function setWS(w){
  ws=w;
  $('btnSun').classList.toggle('active',w==='sun');
  $('btnMon').classList.toggle('active',w==='mon');
  render();
}

loadAndRender();
</script>
</body>
</html>
